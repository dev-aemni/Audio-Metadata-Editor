<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Metadata Editor v1.1.2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { spotify: '#1DB954', dark: '#121212', panel: '#181818', light: '#282828' } } }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #1DB954; }
    </style>
</head>
<body class="bg-dark text-white font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-panel p-4 shadow-md flex justify-between items-center border-b border-light">
        <h1 class="text-2xl font-bold text-spotify"><i class="fas fa-music mr-2"></i> MetadataEditor v1.1.4</h1>
        <button id="searchBtn" class="bg-light hover:bg-gray-700 text-white px-4 py-2 rounded hidden transition">
            <i class="fas fa-search mr-2"></i>Search MusicBrainz
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 flex flex-col items-center">
        
        <!-- Drag & Drop Zone -->
        <div id="dropZone" class="w-full max-w-4xl border-2 border-dashed border-gray-600 rounded-lg p-12 text-center hover:border-spotify transition cursor-pointer bg-panel">
            <i class="fas fa-cloud-upload-alt text-5xl text-gray-400 mb-4"></i>
            <h2 class="text-xl font-semibold mb-2">Drop Audio Here</h2>
            <p class="text-gray-400 text-sm">Supports MP3 (Full Tagging)</p>
            <input type="file" id="audioInput" accept="audio/mpeg" class="hidden">
        </div>

        <!-- Editor Area -->
        <div id="editorArea" class="w-full max-w-5xl hidden grid grid-cols-1 md:grid-cols-3 gap-8 mt-6">
            
            <!-- Left Column: Cover Art & File Info -->
            <div class="col-span-1 flex flex-col items-center bg-panel p-6 rounded-lg">
                <div class="relative group w-48 h-48 mb-4 bg-light rounded shadow-lg overflow-hidden flex items-center justify-center">
                    <img id="coverPreview" src="https://dummyimage.com/300x300/282828/1db954.png&text=No+Cover" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black bg-opacity-70 hidden group-hover:flex flex-col justify-center items-center transition">
                        <label class="cursor-pointer text-white hover:text-spotify mb-2">
                            <i class="fas fa-camera mr-1"></i> Change
                            <input type="file" id="coverInput" accept="image/*" class="hidden">
                        </label>
                        <button id="removeCoverBtn" class="text-white hover:text-red-500"><i class="fas fa-trash mr-1"></i> Remove</button>
                    </div>
                </div>
                
                <div class="w-full bg-light p-4 rounded text-sm text-gray-300 mb-4">
                    <p class="flex justify-between border-b border-gray-600 py-1"><span>Format:</span> <span id="infoCodec">-</span></p>
                    <p class="flex justify-between border-b border-gray-600 py-1"><span>Size:</span> <span id="infoSize">-</span></p>
                    <p class="flex justify-between py-1"><span>Bitrate:</span> <span id="infoBitrate">-</span></p>
                </div>

                <div class="flex gap-2 w-full">
                    <button id="autoFixBtn" class="flex-1 bg-light hover:bg-gray-700 p-2 rounded text-sm transition"><i class="fas fa-magic text-spotify"></i> Fix Text</button>
                </div>
            </div>

            <!-- Right Column: Form Fields -->
            <div class="col-span-2 bg-panel p-6 rounded-lg grid grid-cols-2 gap-4">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-xs text-gray-400">Title</label>
                    <input type="text" id="tagTitle" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-xs text-gray-400">Artist</label>
                    <input type="text" id="tagArtist" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-xs text-gray-400">Album</label>
                    <input type="text" id="tagAlbum" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-xs text-gray-400">Album Artist</label>
                    <input type="text" id="tagAlbumArtist" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-xs text-gray-400">Genre</label>
                    <input type="text" id="tagGenre" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="grid grid-cols-2 gap-2 col-span-2 md:col-span-1">
                    <div>
                        <label class="text-xs text-gray-400">Year</label>
                        <input type="text" id="tagYear" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Track No.</label>
                        <input type="text" id="tagTrack" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                    </div>
                </div>
                <div class="col-span-2">
                    <label class="text-xs text-gray-400">Composer</label>
                    <input type="text" id="tagComposer" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2">
                    <label class="text-xs text-gray-400">Comments</label>
                    <input type="text" id="tagComment" class="w-full bg-light text-white p-2 rounded border border-transparent focus:border-spotify focus:outline-none transition-colors">
                </div>
                <div class="col-span-2 mt-4">
                    <button id="compareBtn" class="w-full bg-spotify hover:bg-green-600 text-black font-bold py-3 rounded transition shadow-lg">
                        <i class="fas fa-save mr-2"></i> Review & Save Metadata
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Comparison Modal -->
    <div id="compareModal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex justify-center items-center z-50">
        <div class="bg-panel w-full max-w-3xl rounded-lg shadow-2xl p-6">
            <h2 class="text-2xl font-bold mb-4 border-b border-gray-700 pb-2">Review Changes</h2>
            <div class="grid grid-cols-2 gap-4 text-sm mb-6 max-h-96 overflow-y-auto">
                <div>
                    <h3 class="text-red-400 font-bold mb-2">Before (Original)</h3>
                    <div id="beforeTags" class="space-y-2 text-gray-300"></div>
                </div>
                <div>
                    <h3 class="text-spotify font-bold mb-2">After (New)</h3>
                    <div id="afterTags" class="space-y-2 text-white"></div>
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-4">
                <button id="cancelSaveBtn" class="bg-light hover:bg-gray-700 px-6 py-2 rounded transition">Cancel</button>
                <button id="confirmSaveBtn" class="bg-spotify hover:bg-green-600 text-black font-bold px-6 py-2 rounded transition"><i class="fas fa-download mr-2"></i> Download Updated File</button>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <!-- Project JS Files -->
    <script src="browser-id3-writer.js"></script>
    <script src="utils.js"></script>
    <script src="image.js"></script>
    <script src="metadata.js"></script>
    <script src="app.js"></script>
</body>
</html>
